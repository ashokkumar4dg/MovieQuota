<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieQuota Daily Picks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="aurora aurora-a"></div>
      <div class="aurora aurora-b"></div>
      <div class="aurora aurora-c"></div>

      <header class="topbar glass-panel">
        <div>
          <h1>MovieQuota</h1>
          <p class="subtle">Swipe, like and rate today's 10 hand-picked titles.</p>
        </div>
      </header>

      <main class="layout">
        <section class="stack-panel">
          <div class="progress-panel glass-panel">
            <div class="progress-copy">
              <span id="dayLabel" class="chip chip-soft">Today</span>
              <strong id="progressText">0 / 10 completed</strong>
            </div>
            <div class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>

          <section id="cardSection" class="card-section">
            <article id="recommendationCard" class="recommendation-card glass-panel">
              <div class="card-sheen"></div>
              <div class="poster-wrap">
                <img id="posterImage" alt="Movie poster" />
                <div class="poster-overlay"></div>
                <div class="top-badges">
                  <span id="typeBadge" class="chip">Movie</span>
                  <span id="industryBadge" class="chip chip-soft">Hollywood</span>
                </div>
              </div>

              <div class="card-content">
                <div class="title-block">
                  <div class="title-row">
                    <h2 id="titleText">Loading...</h2>
                  </div>
                  <div class="meta-row">
                    <p id="metaText" class="subtle"></p>
                    <div class="ratings-row">
                      <span id="imdbBadge" class="rating-text">IMDb</span>
                      <span id="tmdbBadge" class="rating-text">TMDB</span>
                    </div>
                  </div>
                </div>

                <p id="descriptionText" class="description"></p>

                <div class="genre-row" id="genreRow"></div>

                <div class="rating-block glass-panel">
                  <div class="rating-head">
                    <strong>Your Rating</strong>
                    <span id="ratingState" class="subtle">Tap 1-10 to lock</span>
                  </div>
                  <div id="ratingGrid" class="rating-grid"></div>
                </div>

              </div>
            </article>
            <div class="outside-actions">
              <button id="skipButton" class="side-swipe side-swipe-left" type="button" aria-label="Swipe left or skip">
                <span class="side-swipe-icon side-swipe-icon-left"></span>
              </button>
              <a class="telegram-mid-link" href="https://t.me/MovieQuota" target="_blank" rel="noreferrer" aria-label="Open Telegram channel">
                <span class="telegram-mid-icon"></span>
              </a>
              <button id="interestedButton" class="side-swipe side-swipe-right" type="button" aria-label="Swipe right or continue">
                <span class="side-swipe-icon side-swipe-icon-right"></span>
              </button>
            </div>

            <section id="doneState" class="done-state glass-panel hidden">
              <p class="eyebrow completion-eyebrow">Completed</p>
              <h2>Today's 10 picks are done.</h2>
              <p id="summaryText" class="subtle"></p>
              <section id="recommendationBox" class="recommendation-box glass-panel hidden">
                <p class="eyebrow recommendation-label">Recommended Next</p>
                <div id="recommendationGrid" class="recommendation-grid"></div>
              </section>
              <p id="unlockText" class="unlock-text"></p>
              <div class="done-actions">
                <button id="doneHistoryButton" class="glass-button" type="button">Open History</button>
                <button id="retakeButton" class="glass-button alt" type="button">Retake Today</button>
              </div>
              <section id="doneHistoryPreview" class="done-history-preview hidden">
                <p class="eyebrow recommendation-label">Your Rated History</p>
                <div id="doneHistoryList" class="done-history-list"></div>
              </section>
            </section>
          </section>
        </section>

        <aside id="historyPanel" class="history-panel glass-panel hidden">
          <div class="history-header">
            <div>
              <p class="eyebrow">Your Activity</p>
              <h3>History</h3>
            </div>
            <button id="closeHistoryButton" class="ghost-button" type="button">Close</button>
          </div>
          <div class="history-tabs">
            <button data-tab="today" class="tab-button active" type="button">Today</button>
            <button data-tab="yesterday" class="tab-button" type="button">Yesterday</button>
            <button data-tab="week" class="tab-button" type="button">Last 7 Days</button>
          </div>
          <div id="historyContent" class="history-content"></div>
        </aside>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
